spring:
  datasource:
    url: jdbc:h2:mem:pub_game;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  address: 0.0.0.0

groq:
  api:
    key: ${GROQ_API_KEY:}
    model: "llama-3.3-70b-versatile"
    temperature: 0.7
    image-blur-temperature: 1.3

tmdb:
  api:
    key: ${TMDB_API_KEY:}

game:
  difficulty-levels:
    facile: "domande per bambini o cultura generale molto basilare. Risposte ovvie."
    medio: "domande per adulti mediamente istruiti. Richiedono riflessione."
    difficile: "domande da esperti, dettagli storici precisi, concetti scientifici avanzati."
